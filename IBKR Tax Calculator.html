<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBKR Tax Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f; --surface: #111419; --surface2: #181c23;
    --border: #222831; --text: #e8ecf0; --muted: #5a6473;
    --green: #00c853; --red: #ff4757; --yellow: #ffd32a;
    --blue: #00b4d8; --amber: #ffb347; --euro: #a78bfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

  /* ── LANG TOGGLE ── */
  .lang-bar {
    position: absolute; top: 16px; right: 20px;
    display: flex; gap: 4px; z-index: 10;
  }
  .lang-btn {
    font-size: 11px; padding: 4px 10px;
    border-radius: 5px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; color: var(--muted);
    font-family: 'Syne', sans-serif; font-weight: 700;
    transition: background 0.12s, color 0.12s;
  }
  .lang-btn:hover { background: var(--surface2); color: var(--text); }
  .lang-btn.active { background: var(--amber); color: #111; border-color: var(--amber); }

  /* ── DROP SCREEN ── */
  #drop-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 28px;
    padding: 60px 24px 40px; position: relative; overflow: hidden;
  }
  #drop-screen::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 30% 60%, rgba(255,179,71,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 70% 30%, rgba(167,139,250,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  .drop-label  { font-size: 11px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; z-index: 1; }
  .drop-title  { font-size: clamp(26px,5vw,50px); font-weight: 800; line-height: 1.1; text-align: center; z-index: 1; }
  .drop-title span { color: var(--amber); }

  .drop-zones { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 700px; z-index: 1; }
  @media (max-width: 560px) { .drop-zones { grid-template-columns: 1fr; } }

  .drop-zone {
    border: 2px dashed var(--border); border-radius: 14px; padding: 32px 20px;
    text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--amber); background: var(--surface2); }
  .drop-zone.loaded { border-color: var(--green); border-style: solid; }
  .drop-zone.optional { border-color: rgba(167,139,250,0.3); }
  .drop-zone.optional:hover, .drop-zone.optional.drag-over { border-color: var(--euro); background: var(--surface2); }
  .drop-zone.optional.loaded { border-color: var(--euro); border-style: solid; }

  .dz-icon  { font-size: 28px; margin-bottom: 10px; }
  .dz-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .dz-sub   { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  .dz-badge {
    position: absolute; top: 10px; right: 10px;
    font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .dz-badge.required { background: rgba(255,179,71,0.15); color: var(--amber); }
  .dz-badge.optional { background: rgba(167,139,250,0.15); color: var(--euro); }
  .dz-badge.ok       { background: rgba(0,200,83,0.15); color: var(--green); }

  .btn-upload {
    background: var(--amber); color: #111; border: none; border-radius: 7px; padding: 8px 18px;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-upload:hover { opacity: 0.85; }
  .btn-upload.purple { background: var(--euro); color: #111; }

  .dz-filename { margin-top: 10px; font-size: 11px; color: var(--green); font-family: 'Space Mono', monospace; word-break: break-all; }

  .start-btn {
    background: var(--amber); color: #111; border: none; border-radius: 10px; padding: 13px 40px;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer;
    transition: opacity 0.15s; z-index: 1; opacity: 0.35; pointer-events: none;
  }
  .start-btn.ready { opacity: 1; pointer-events: auto; }
  .start-btn.ready:hover { opacity: 0.85; }
  .drop-hint { font-size: 12px; color: var(--muted); max-width: 560px; text-align: center; line-height: 1.7; z-index: 1; }

  #error-box .error-msg {
    background: rgba(255,71,87,0.12); border: 1px solid rgba(255,71,87,0.3);
    color: var(--red); border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-top: 8px; max-width: 600px;
  }

  /* ── DASHBOARD ── */
  #dashboard { display: none; max-width: 1400px; margin: 0 auto; }

  .stale-banner { background: rgba(255,179,71,0.10); border-bottom: 2px solid var(--amber); padding: 16px 24px; display: flex; align-items: flex-start; gap: 14px; }
  .stale-icon  { font-size: 24px; flex-shrink: 0; line-height: 1; }
  .stale-title { font-size: 16px; font-weight: 800; color: var(--amber); letter-spacing: -0.01em; margin-bottom: 4px; }
  .stale-body  { font-size: 13px; color: #c9a35e; line-height: 1.6; }
  .stale-body strong { color: var(--amber); }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px 14px; border-bottom: 1px solid var(--border);
    background: var(--surface); gap: 10px; flex-wrap: wrap; position: relative;
  }
  .top-bar h1 { font-size: 19px; font-weight: 800; letter-spacing: -0.02em; }
  .top-bar h1 span { color: var(--amber); }

  .file-chip {
    display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 9px; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
    max-width: 220px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .file-chip.eur-chip { border-color: rgba(167,139,250,0.3); color: var(--euro); }

  .reset-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 7px; padding: 5px 11px;
    color: var(--muted); font-family: 'Syne', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 2px; background: var(--border); border-bottom: 1px solid var(--border); }
  .kpi-card { background: var(--surface); padding: 18px 18px 14px; position: relative; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi-card.amber::before { background: var(--amber); } .kpi-card.green::before { background: var(--green); }
  .kpi-card.red::before   { background: var(--red); }   .kpi-card.blue::before  { background: var(--blue); }
  .kpi-card.euro::before  { background: var(--euro); }
  .kpi-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .kpi-value { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; }
  .kpi-sub   { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 4px; }
  .kpi-value.pos   { color: var(--green); } .kpi-value.neg  { color: var(--red); }
  .kpi-value.amber { color: var(--amber); } .kpi-value.euro { color: var(--euro); }
  .kpi-value.blue  { color: var(--blue); }

  .section { padding: 24px 24px 0; margin-bottom: 24px; }
  .section-title { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

  .table-wrapper { overflow-x: auto; }
  table.tax-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px; }
  table.tax-table thead th {
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); border-bottom: 1px solid var(--border); padding: 0 12px 10px; text-align: left; white-space: nowrap;
  }
  table.tax-table thead th.right { text-align: right; }
  table.tax-table thead th.eur   { color: var(--euro); }
  table.tax-table tbody tr { border-bottom: 1px solid rgba(128,128,128,0.07); transition: background 0.1s; }
  table.tax-table tbody tr:hover { background: var(--surface2); }
  table.tax-table tbody td { padding: 9px 12px; }
  table.tax-table tbody td.mono  { font-family: 'Space Mono', monospace; font-size: 11px; }
  table.tax-table tbody td.right { text-align: right; font-family: 'Space Mono', monospace; font-size: 11px; }
  .val-pos  { color: var(--green); } .val-neg   { color: var(--red); }
  .val-muted { color: var(--muted); } .val-euro { color: var(--euro); }

  .badge { display: inline-flex; align-items: center; border-radius: 4px; padding: 2px 7px; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; }
  .badge-tax     { background: rgba(255,179,71,0.12); color: var(--amber); }
  .badge-exempt  { background: rgba(0,200,83,0.10);   color: var(--green); }
  .badge-unknown { background: rgba(90,100,115,0.20);  color: var(--muted); }
  .badge-loss    { background: rgba(255,71,87,0.10);   color: var(--red); }

  table.tax-table tfoot td { padding: 10px 12px; border-top: 1px solid var(--border); font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; background: var(--surface2); }

  .notice { background: rgba(255,179,71,0.06); border: 1px solid rgba(255,179,71,0.2); border-radius: 10px; padding: 13px 16px; font-size: 12px; line-height: 1.7; color: var(--muted); margin-top: 6px; }
  .notice strong { color: var(--amber); }

  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 13px; padding: 22px 26px; margin-top: 6px; }
  .summary-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid rgba(128,128,128,0.08); gap: 16px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row.total-row { border-top: 2px solid var(--euro); border-bottom: none; padding-top: 14px; margin-top: 6px; }
  .summary-label { font-size: 13px; color: var(--muted); }
  .summary-row.total-row .summary-label { font-size: 14px; font-weight: 700; color: var(--text); }
  .summary-values { display: flex; gap: 20px; align-items: baseline; }
  .summary-value { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; }
  .summary-value.eur { color: var(--euro); }
  .summary-row.total-row .summary-value { font-size: 20px; }
  .summary-row.total-row .summary-value.eur { font-size: 26px; color: var(--euro); }
  .empty-state { text-align: center; color: var(--muted); padding: 28px; font-size: 13px; }
</style>
</head>
<body>

<!-- ── DROP SCREEN ── -->
<div id="drop-screen">
  <!-- Language toggle -->
  <div class="lang-bar">
    <button class="lang-btn active" id="ds-btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn"        id="ds-btn-hr" onclick="setLang('hr')">HR</button>
  </div>

  <div class="drop-label"  id="ds-drop-label"></div>
  <div class="drop-title"  id="ds-drop-title"></div>

  <div class="drop-zones">
    <div class="drop-zone" id="dz-csv">
      <span class="dz-badge required" id="badge-csv"></span>
      <div class="dz-icon">📋</div>
      <div class="dz-title" id="dz-csv-title"></div>
      <div class="dz-sub"   id="dz-csv-sub"></div>
      <button class="btn-upload" id="btn-csv-upload" onclick="event.stopPropagation(); document.getElementById('fi-csv').click()"></button>
      <div class="dz-filename" id="csv-fname"></div>
    </div>
    <div class="drop-zone optional" id="dz-fx">
      <span class="dz-badge optional" id="badge-fx"></span>
      <div class="dz-icon">💱</div>
      <div class="dz-title" id="dz-fx-title"></div>
      <div class="dz-sub"   id="dz-fx-sub"></div>
      <button class="btn-upload purple" id="btn-fx-upload" onclick="event.stopPropagation(); document.getElementById('fi-fx').click()"></button>
      <div class="dz-filename" id="fx-fname"></div>
    </div>
  </div>

  <input type="file" id="fi-csv" accept=".csv"  style="display:none">
  <input type="file" id="fi-fx"  accept=".json" style="display:none">

  <button class="start-btn" id="start-btn" onclick="runAnalysis()"></button>
  <div class="drop-hint" id="ds-hint"></div>
  <div id="error-box"></div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div id="stale-banner" class="stale-banner" style="display:none">
    <div class="stale-icon">⚠</div>
    <div>
      <div class="stale-title" id="stale-title"></div>
      <div class="stale-body"  id="stale-body"></div>
    </div>
  </div>

  <div class="top-bar">
    <h1>IBKR <span id="db-title-span"></span> <span style="font-size:11px;font-weight:400;color:var(--muted);font-family:'Space Mono',monospace;margin-left:8px;">v1.0</span></h1>
    <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;">
      <div class="file-chip"><span>📋</span><span id="chip-csv">—</span></div>
      <div class="file-chip eur-chip" id="chip-fx-wrap" style="display:none">
        <span>💱</span><span id="chip-fx">—</span>
      </div>
      <div class="file-chip" id="period-chip" style="display:none;color:var(--amber);border-color:rgba(255,179,71,0.25)"></div>
      <button class="reset-btn" id="db-reset-btn" onclick="resetApp()"></button>
      <button class="lang-btn" id="db-btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn active" id="db-btn-hr" onclick="setLang('hr')">HR</button>
    </div>
  </div>

  <div id="kpi-grid" class="kpi-grid"></div>

  <div class="section">
    <div class="section-title" id="sec-options"></div>
    <div class="table-wrapper">
      <table class="tax-table">
        <thead id="opt-thead"></thead>
        <tbody id="opt-tbody"></tbody>
        <tfoot id="opt-tfoot"></tfoot>
      </table>
    </div>
  </div>

  <div class="section">
    <div class="section-title" id="sec-stocks"></div>
    <div class="table-wrapper">
      <table class="tax-table">
        <thead id="stk-thead"></thead>
        <tbody id="stk-tbody"></tbody>
        <tfoot id="stk-tfoot"></tfoot>
      </table>
    </div>
    <div id="stk-notice" style="display:none" class="notice"></div>
  </div>

  <div class="section">
    <div class="section-title" id="sec-summary"></div>
    <div class="summary-card" id="summary-card"></div>
    <div class="notice" style="margin-top:14px;margin-bottom:28px" id="disclaimer"></div>
  </div>
</div>

// ── UTILS ──────────────────────────────────────────────────────
function num(v) {
  if (v === '--' || v === '' || v == null) return 0;
  return parseFloat(String(v).replace(/,/g, '')) || 0;
}

function dateKey(d) {
  if (!d) return '';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function parseHNBRate(s) { return parseFloat(String(s).replace(',', '.')); }

function loadFxData(obj) {
  _fxRates = {}; _fxLastDate = null;
  for (const [k, v] of Object.entries(obj)) {
    _fxRates[k] = parseHNBRate(v);
    const d = new Date(k + 'T00:00:00');
    if (!_fxLastDate || d > _fxLastDate) { _fxLastDate = d; _fxLastKey = k; _fxLastRate = _fxRates[k]; }
  }
}

function getFxRate(date) {
  if (!_fxRates || !date) return null;
  if (_fxLastDate && date > _fxLastDate) return _fxLastRate;
  for (let i = 0; i <= 10; i++) {
    const k = dateKey(new Date(date.getTime() - i * 86400000));
    if (_fxRates[k] != null) return _fxRates[k];
  }
  return null;
}

function toEUR(usd, date) { const r = getFxRate(date); return r ? usd / r : null; }

function fmt(v, showSign = false, cur = '$') {
  if (v === null || v === undefined || isNaN(+v)) return '—';
  const n = +v;
  const sign = showSign ? (n >= 0 ? '+' : '') : '';
  const abs = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return `${sign}${n < 0 ? '-' : ''}${cur}${abs}`;
}

function fmtE(v, s = false) { return fmt(v, s, '€'); }
function escH(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function parseTradeDate(str) {
  if (!str) return null;
  const m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
}

function daysBetween(a, b) { return (!a || !b) ? null : Math.round((b - a) / 86400000); }

function fmtDate(d) {
  if (!d) return '—';
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

// ── IBKR PARSER ────────────────────────────────────────────────
function parseIBKR(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const rows = [];
  let i = 0, n = text.length;
  while (i < n) {
    const row = [];
    while (i < n && text[i] !== '\n') {
      if (text[i] === '"') {
        let cell = ''; i++;
        while (i < n) {
          if (text[i] === '"' && text[i+1] === '"') { cell += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else cell += text[i++];
        }
        row.push(cell);
      } else {
        let cell = '';
        while (i < n && text[i] !== ',' && text[i] !== '\n') cell += text[i++];
        row.push(cell.trim());
      }
      if (i < n && text[i] === ',') i++;
    }
    if (i < n) i++;
    if (row.length > 1 || (row.length === 1 && row[0])) rows.push(row);
  }
  const sections = {};
  for (const row of rows) {
    const sec = row[0];
    if (!sections[sec]) sections[sec] = [];
    sections[sec].push(row);
  }
  return sections;
}

function getData(sections, sec) { return (sections[sec] || []).filter(r => r[1] === 'Data'); }

// Header-driven column mapping — finds each column by name, not by hardcoded index.
// Returns lowercase column name → array index, scanning from startCol (default 5).
function colMap(sections, sec, startCol) {
  startCol = startCol === undefined ? 5 : startCol;
  const headerRow = (sections[sec] || []).find(r => r[1] === 'Header');
  const map = {};
  if (!headerRow) return map;
  for (let i = startCol; i < headerRow.length; i++) {
    const key = headerRow[i].trim().toLowerCase();
    if (key) map[key] = i;
  }
  return map;
}
// Variant for sections with multiple headers (e.g. Open Positions — one per asset class)
function colMapLast(sections, sec, startCol) {
  startCol = startCol === undefined ? 5 : startCol;
  const headers = (sections[sec] || []).filter(r => r[1] === 'Header');
  const headerRow = headers[headers.length - 1] || null;
  const map = {};
  if (!headerRow) return map;
  for (let i = startCol; i < headerRow.length; i++) {
    const key = headerRow[i].trim().toLowerCase();
    if (key) map[key] = i;
  }
  return map;
}
function ci(map, name, fallback) { return map[name] !== undefined ? map[name] : fallback; }

const MONTHS_MAP = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};

function parseOptSym(sym) {
  if (!sym) return null;
  const m = sym.trim().match(/^(\S+)\s+(\d{1,2})([A-Z]{3})(\d{2})\s+([\d.]+)\s+(P|C)$/i);
  if (!m) return null;
  const mon = MONTHS_MAP[m[3].toUpperCase()];
  if (mon === undefined) return null;
  return { ticker: m[1].toUpperCase(), expiry: new Date(2000 + +m[4], mon, +m[2]), strike: parseFloat(m[5]), type: m[6].toUpperCase() };
}

// ── PROCESSOR ──────────────────────────────────────────────────
function processTax(sections) {
  const hasFx   = _fxRates !== null;
  const period  = (getData(sections,'Statement').find(r => r[2]==='Period') || [])[3] || '';

  // ── Header-driven column indices for Trades ──
  const trCols     = colMap(sections, 'Trades');
  const iTrSym     = ci(trCols, 'symbol',       5);
  const iTrDate    = ci(trCols, 'date/time',     6);
  const iTrQty     = ci(trCols, 'quantity',      7);
  const iTrProc    = ci(trCols, 'proceeds',     10);
  const iTrComm    = ci(trCols, 'comm/fee',     11);
  const iTrRealPL  = ci(trCols, 'realized p/l', 13);
  const iTrCode    = ci(trCols, 'code',         15);

  // ── Header-driven column indices for Open Positions ──
  const opCols  = colMapLast(sections, 'Open Positions');
  const iOpSym  = ci(opCols, 'symbol',   5);
  const iOpQty  = ci(opCols, 'quantity', 6);

  const optOrderRows = (sections['Trades']||[]).filter(r => r[1]==='Data' && r[2]==='Order' && r[3]==='Equity and Index Options');
  const optTradesBySym = {};
  for (const r of optOrderRows) {
    const sym = (r[iTrSym]||'').trim(); if (!sym) continue;
    if (!optTradesBySym[sym]) optTradesBySym[sym] = [];
    optTradesBySym[sym].push({ date: parseTradeDate(r[iTrDate]), qty: num(r[iTrQty]), code: (r[iTrCode]||'').trim() });
  }

  const optSubTotals = (sections['Trades']||[]).filter(r => r[1]==='SubTotal' && r[3]==='Equity and Index Options' && r[4]==='USD');
  const openOptSyms  = new Set((sections['Open Positions']||[]).filter(r => r[1]==='Data' && r[2]==='Summary' && r[3]==='Equity and Index Options').map(r => (r[iOpSym]||'').trim()));

  const closedOptions = [];
  for (const r of optSubTotals) {
    const sym = (r[iTrSym]||'').trim();
    if (!sym || num(r[iTrQty]) !== 0 || openOptSyms.has(sym)) continue;
    const parsed = parseOptSym(sym); if (!parsed) continue;
    const realPL  = num(r[iTrRealPL]);
    const trades  = (optTradesBySym[sym]||[]).slice().sort((a,b) => a.date-b.date);
    const openT   = trades.filter(t => t.qty < 0);
    const closeT  = trades.filter(t => t.qty > 0 || t.code.includes('A'));
    const openDate  = openT.length  ? openT[0].date  : null;
    const closeDate = closeT.length ? closeT[closeT.length-1].date : (trades.length ? trades[trades.length-1].date : null);
    const days    = daysBetween(openDate, closeDate);
    const exempt  = days !== null && days > EXEMPT_DAYS;
    const taxable = !exempt && realPL !== 0;
    const realPL_eur = hasFx ? toEUR(realPL, closeDate) : null;
    const tax_usd    = taxable && realPL > 0 ? realPL * TAX_RATE : 0;
    const tax_eur    = taxable && realPL_eur != null && realPL_eur > 0 ? realPL_eur * TAX_RATE : (taxable && realPL > 0 ? null : 0);
    closedOptions.push({ sym, ticker: parsed.ticker, type: parsed.type, openDate, closeDate, days, realPL, realPL_eur, exempt, taxable, tax_usd, tax_eur });
  }

  const stockOrderRows = (sections['Trades']||[]).filter(r => r[1]==='Data' && r[2]==='Order' && r[3]==='Stocks');
  const stockBuysBySym = {}, stockSellsBySym = {};
  for (const r of stockOrderRows) {
    const sym = (r[iTrSym]||'').trim(), qty = num(r[iTrQty]), date = parseTradeDate(r[iTrDate]);
    if (!sym || !date) continue;
    if (qty > 0) {
      const tc = Math.abs(num(r[iTrProc])) + Math.abs(num(r[iTrComm]));
      if (!stockBuysBySym[sym]) stockBuysBySym[sym] = [];
      stockBuysBySym[sym].push({ date, qty, totalCost: tc, pricePerShare: tc/qty });
    } else if (qty < 0) {
      const np = num(r[iTrProc]) + num(r[iTrComm]);
      if (!stockSellsBySym[sym]) stockSellsBySym[sym] = [];
      stockSellsBySym[sym].push({ date, qty: Math.abs(qty), netProceeds: np, ibkrRL: num(r[iTrRealPL]) });
    }
  }

  const stockLots = []; let hasPriorPeriod = false;
  for (const sym of Object.keys(stockSellsBySym)) {
    const sells    = stockSellsBySym[sym].slice().sort((a,b) => a.date-b.date);
    const buyQueue = (stockBuysBySym[sym]||[]).slice().sort((a,b) => a.date-b.date);
    for (const sell of sells) {
      let left = sell.qty; const pps = sell.netProceeds / sell.qty;
      while (left > 0) {
        if (buyQueue.length > 0) {
          const buy = buyQueue[0], mq = Math.min(left, buy.qty);
          const cost = buy.pricePerShare * mq, proceeds = pps * mq, gain = proceeds - cost;
          const days = daysBetween(buy.date, sell.date), exempt = days !== null && days > EXEMPT_DAYS;
          const cost_eur = hasFx ? toEUR(cost, buy.date) : null;
          const proc_eur = hasFx ? toEUR(proceeds, sell.date) : null;
          const gain_eur = cost_eur != null && proc_eur != null ? proc_eur - cost_eur : null;
          const tax_usd  = !exempt && gain > 0 ? gain * TAX_RATE : 0;
          const tax_eur  = !exempt && gain_eur != null && gain_eur > 0 ? gain_eur * TAX_RATE : (!exempt && gain > 0 ? null : 0);
          stockLots.push({ sym, buyDate: buy.date, sellDate: sell.date, qty: mq, costBasis: cost, proceeds, gain, cost_eur, proceeds_eur: proc_eur, gain_eur, days, exempt, taxable: !exempt, tax_usd, tax_eur, priorPeriod: false });
          buy.qty -= mq; if (buy.qty <= 0) buyQueue.shift(); left -= mq;
        } else {
          hasPriorPeriod = true;
          const gain = sell.ibkrRL, gain_eur = hasFx ? toEUR(gain, sell.date) : null;
          stockLots.push({ sym, buyDate: null, sellDate: sell.date, qty: left, costBasis: null, proceeds: pps*left, gain, cost_eur: null, proceeds_eur: hasFx ? toEUR(pps*left, sell.date) : null, gain_eur, days: null, exempt: null, taxable: null, tax_usd: null, tax_eur: null, priorPeriod: true });
          left = 0;
        }
      }
    }
  }

  const sum = (arr, fn) => arr.reduce((s,x) => { const v=fn(x); return v!=null && !isNaN(v) ? s+v : s; }, 0);
  const oTG  = sum(closedOptions, o => o.realPL > 0 && o.taxable ? o.realPL : 0);
  const oTL  = sum(closedOptions, o => o.realPL < 0 && o.taxable ? o.realPL : 0);
  const oTGe = hasFx ? sum(closedOptions, o => o.realPL_eur > 0 && o.taxable ? o.realPL_eur : 0) : null;
  const oTLe = hasFx ? sum(closedOptions, o => o.realPL_eur < 0 && o.taxable ? o.realPL_eur : 0) : null;
  const oEx  = sum(closedOptions, o => o.realPL > 0 && o.exempt ? o.realPL : 0);
  const known = stockLots.filter(l => !l.priorPeriod);
  const sTG  = sum(known, l => l.gain > 0 && l.taxable ? l.gain : 0);
  const sTL  = sum(known, l => l.gain < 0 && l.taxable ? l.gain : 0);
  const sTGe = hasFx ? sum(known, l => l.gain_eur > 0 && l.taxable ? l.gain_eur : 0) : null;
  const sTLe = hasFx ? sum(known, l => l.gain_eur < 0 && l.taxable ? l.gain_eur : 0) : null;
  const sEx  = sum(known, l => l.gain > 0 && l.exempt ? l.gain : 0);
  const net_usd = oTG+oTL+sTG+sTL;
  const net_eur = hasFx ? oTGe+oTLe+sTGe+sTLe : null;
  const tax_usd = Math.max(0, net_usd) * TAX_RATE;
  const tax_eur = hasFx ? Math.max(0, net_eur) * TAX_RATE : null;
  const exempt  = oEx + sEx;

  let fxStale = false;
  if (hasFx && _fxLastDate) {
    fxStale = [...closedOptions.map(o=>o.closeDate), ...closedOptions.map(o=>o.openDate), ...stockLots.map(l=>l.sellDate), ...stockLots.map(l=>l.buyDate)].filter(Boolean).some(d => d > _fxLastDate);
  }

  return { period, closedOptions, stockLots, hasPriorPeriod, hasFx, fxStale,
    oTG, oTL, oTGe, oTLe, sTG, sTL, sTGe, sTLe, net_usd, net_eur, tax_usd, tax_eur, exempt };
}

const dzCsv = document.getElementById('dz-csv');
const dzFx  = document.getElementById('dz-fx');

function setupDrop(zone, onFile) {
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); const f=e.dataTransfer.files[0]; if(f) onFile(f); });
  zone.addEventListener('click', () => { if(zone===dzCsv) fiCsv.click(); else fiFx.click(); });
}
setupDrop(dzCsv, setCsvFile);
setupDrop(dzFx,  setFxFile);
fiCsv.addEventListener('change', () => { if(fiCsv.files[0]) setCsvFile(fiCsv.files[0]); });
fiFx.addEventListener('change',  () => { if(fiFx.files[0])  setFxFile(fiFx.files[0]); });

function setCsvFile(file) {
  _csvFile = file;
  document.getElementById('csv-fname').textContent = file.name;
  dzCsv.classList.add('loaded');
  const b = document.getElementById('badge-csv');

}

function setFxFile(file) {

  document.getElementById('fx-fname').textContent = file.name;

}

function checkReady() {
  document.getElementById('start-btn').classList.toggle('ready', _csvFile !== null);
}

function resetApp() {
  _csvFile = _fxFile = _fxRates = _lastData = null;
  _fxLastDate = _fxLastKey = _fxLastRate = null;
  document.getElementById('dashboard').style.display   = 'none';
  document.getElementById('drop-screen').style.display = 'flex';
  document.getElementById('error-box').innerHTML = '';
  fiCsv.value = ''; fiFx.value = '';
  document.getElementById('csv-fname').textContent = '';
  document.getElementById('fx-fname').textContent  = '';
  dzCsv.classList.remove('loaded'); dzFx.classList.remove('loaded');
  const bc = document.getElementById('badge-csv');
  bc.textContent = T('badgeRequired'); bc.className = 'dz-badge required';
  const bf = document.getElementById('badge-fx');
  bf.textContent = T('badgeOptional'); bf.className = 'dz-badge optional';
  document.getElementById('start-btn').classList.remove('ready');
  // Re-apply auto-load indicator if FX was auto-loaded
  fetch('./tecajna_lista_usd.json')
    .then(r => { if(!r.ok) throw 0; return r.json(); })
    .then(data => {
      loadFxData(data); _fxAutoLoaded = true;
      dzFx.classList.add('loaded');
      const b = document.getElementById('badge-fx');
      b.textContent = T('badgeAuto'); b.className = 'dz-badge ok';
      document.getElementById('fx-fname').textContent = 'tecajna_lista_usd.json';
    }).catch(()=>{});
}

function runAnalysis() {
  if (!_csvFile) return;
  document.getElementById('error-box').innerHTML = '';
  const readCsv = new Promise(res => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsText(_csvFile); });
  const readFx  = _fxFile && !_fxAutoLoaded
    ? new Promise(res => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsText(_fxFile); })
    : Promise.resolve(null);
  Promise.all([readCsv, readFx]).then(([csvText, fxText]) => {
    try {
      const sections = parseIBKR(csvText);
      if (!getData(sections,'Statement').length) throw new Error(T('errNotIBKR'));
      if (fxText) loadFxData(JSON.parse(fxText));
      _lastData = processTax(sections);
      renderDashboard(_lastData);
    } catch(err) {
      document.getElementById('error-box').innerHTML = '<div class="error-msg">⚠ ' + escH(err.message) + '</div>';
    }
  });
}

// ── AUTO-LOAD FX ───────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  applyDropScreenLang();
  fetch('./tecajna_lista_usd.json')
    .then(r => { if(!r.ok) throw 0; return r.json(); })
    .then(data => {
      loadFxData(data); _fxAutoLoaded = true;
      dzFx.classList.add('loaded');
      const b = document.getElementById('badge-fx');
      b.textContent = T('badgeAuto'); b.className = 'dz-badge ok';
      document.getElementById('fx-fname').textContent = 'tecajna_lista_usd.json';
    }).catch(()=>{});
});

// ── RENDER ─────────────────────────────────────────────────────
function renderDashboard(data) {
  document.getElementById('drop-screen').style.display = 'none';
  document.getElementById('dashboard').style.display   = 'block';
  document.getElementById('chip-csv').textContent = _csvFile.name;
  if (_fxFile || _fxAutoLoaded) {
    document.getElementById('chip-fx').textContent = _fxAutoLoaded ? 'tecajna_lista_usd.json' : (_fxFile ? _fxFile.name : '');
    document.getElementById('chip-fx-wrap').style.display = 'flex';
  }
  if (data.period) {
    const pc = document.getElementById('period-chip');
    pc.textContent = '📅 ' + data.period; pc.style.display = 'flex';
  }
  applyDashboardLang();
  renderStaleBanner(data);
  renderKPIs(data);
  renderOptionsTable(data);
  renderStocksTable(data);
  renderSummary(data);
}

function renderStaleBanner(data) {
  const banner = document.getElementById('stale-banner');
  if (!data.hasFx || !data.fxStale) { banner.style.display = 'none'; return; }
  const locale  = _lang === 'hr' ? 'hr-HR' : 'en-GB';
  const lastFmt = _fxLastDate ? _fxLastDate.toLocaleDateString(locale, { day:'2-digit', month:'2-digit', year:'numeric' }) : _fxLastKey;
  const todayFmt = new Date().toLocaleDateString(locale, { day:'2-digit', month:'2-digit', year:'numeric' });
  const rate = _fxLastRate ? _fxLastRate.toFixed(6).replace('.', ',') : '—';
  document.getElementById('stale-title').textContent = T('staleTitle', lastFmt);
  document.getElementById('stale-body').innerHTML    = T('staleBody', lastFmt, rate, todayFmt);
  banner.style.display = 'flex';
}

function renderKPIs(data) {
  const { hasFx, net_usd, net_eur, tax_usd, tax_eur, oTG, oTL, oTGe, oTLe, sTG, sTL, sTGe, sTLe, exempt } = data;
  const tg = oTG+sTG, tl = oTL+sTL;
  const tge = hasFx && oTGe!=null ? oTGe+sTGe : null;
  const tle = hasFx && oTLe!=null ? oTLe+sTLe : null;
  const grid = document.getElementById('kpi-grid'); grid.innerHTML = '';
  const kpis = [
    { label: T('kpiGains'),          value: fmt(tg,true),   sub: tge!=null ? fmtE(tge,true) : null, cls:'pos',   bar:'green' },
    { label: T('kpiLosses'),         value: fmt(tl,true),   sub: tle!=null ? fmtE(tle,true) : null, cls:'neg',   bar:'red' },
    { label: T('kpiNet'),            value: fmt(net_usd),   sub: net_eur!=null ? fmtE(net_eur) : null, cls: net_usd>=0?'pos':'neg', bar:'amber' },
    { label: T('kpiTaxUSD', hasFx),  value: fmt(tax_usd),   sub: null, cls:'amber', bar:'amber' },
    ...(hasFx && tax_eur!=null ? [{ label: T('kpiTaxEUR'), value: fmtE(tax_eur), sub: T('kpiForFiling'), cls:'euro', bar:'euro' }] : []),
    { label: T('kpiExempt'),         value: fmt(exempt),    sub: null, cls:'blue', bar:'blue' },
  ];
  kpis.forEach(k => {
    const c = document.createElement('div'); c.className = `kpi-card ${k.bar}`;
    c.innerHTML = `<div class="kpi-label">${k.label}</div><div class="kpi-value ${k.cls}">${k.value}</div>${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}`;
    grid.appendChild(c);
  });
}

function renderOptionsTable(data) {
  const { closedOptions, hasFx, oTG, oTL } = data;
  const thead = document.getElementById('opt-thead');
  const tbody = document.getElementById('opt-tbody');
  const tfoot = document.getElementById('opt-tfoot');
  thead.innerHTML = `<tr>
    <th>${T('optSymbol')}</th><th>${T('optType')}</th><th>${T('optOpen')}</th><th>${T('optClose')}</th>
    <th class="right">${T('optDays')}</th><th class="right">${T('optPLusd')}</th>
    ${hasFx ? `<th class="right eur">${T('optPLeur')}</th>` : ''}
    <th>${T('optStatus')}</th><th class="right">${T('optTaxUSD')}</th>
    ${hasFx ? `<th class="right eur">${T('optTaxEUR')}</th>` : ''}
  </tr>`;

  if (!closedOptions.length) {
    tbody.innerHTML = `<tr><td colspan="${hasFx?9:7}" class="empty-state">${T('optEmpty')}</td></tr>`;
    tfoot.innerHTML = ''; return;
  }

  tbody.innerHTML = '';
  [...closedOptions].sort((a,b) => (a.closeDate||0)-(b.closeDate||0)).forEach(o => {
    const plCls = o.realPL>0 ? 'val-pos' : o.realPL<0 ? 'val-neg' : '';
    const badge = o.exempt                      ? `<span class="badge badge-exempt">${T('badgeExempt')}</span>`
                : o.realPL<0 && o.taxable       ? `<span class="badge badge-loss">${T('badgeLoss')}</span>`
                : o.taxable                     ? `<span class="badge badge-tax">${T('badgeTaxable')}</span>`
                :                                 `<span class="badge badge-unknown">—</span>`;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${escH(o.sym)}</strong></td>
      <td class="mono">${o.type==='P' ? '<span style="color:var(--green)">PUT</span>' : '<span style="color:var(--red)">CALL</span>'}</td>
      <td class="mono">${fmtDate(o.openDate)}</td><td class="mono">${fmtDate(o.closeDate)}</td>
      <td class="right">${o.days!==null ? o.days+'d' : '—'}</td>
      <td class="right ${plCls}">${fmt(o.realPL,true)}</td>
      ${hasFx ? `<td class="right val-euro">${fmtE(o.realPL_eur,true)}</td>` : ''}
      <td>${badge}</td>
      <td class="right">${o.tax_usd>0 ? `<span class="val-neg">${fmt(o.tax_usd)}</span>` : '—'}</td>
      ${hasFx ? `<td class="right">${o.tax_eur>0 ? `<span class="val-euro">${fmtE(o.tax_eur)}</span>` : '—'}</td>` : ''}
    `;
    tbody.appendChild(tr);
  });

  const net = closedOptions.reduce((s,o) => s+o.realPL, 0);
  const netE = hasFx ? closedOptions.reduce((s,o) => s+(o.realPL_eur||0), 0) : null;
  const totT = closedOptions.reduce((s,o) => s+o.tax_usd, 0);
  const totTE = hasFx ? closedOptions.reduce((s,o) => s+(o.tax_eur||0), 0) : null;
  tfoot.innerHTML = `<tr>
    <td colspan="5" style="color:var(--muted);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;">${T('optFooter', closedOptions.length, fmt(oTG,true), fmt(oTL,true))}</td>
    <td class="right ${net>=0?'val-pos':'val-neg'}">${fmt(net,true)}</td>
    ${hasFx ? `<td class="right val-euro">${fmtE(netE,true)}</td>` : ''}
    <td></td>
    <td class="right val-neg">${totT>0 ? fmt(totT) : '—'}</td>
    ${hasFx ? `<td class="right val-euro">${totTE>0 ? fmtE(totTE) : '—'}</td>` : ''}
  </tr>`;
}

function renderStocksTable(data) {
  const { stockLots, hasFx, sTG, sTL, hasPriorPeriod } = data;
  const thead  = document.getElementById('stk-thead');
  const tbody  = document.getElementById('stk-tbody');
  const tfoot  = document.getElementById('stk-tfoot');
  const notice = document.getElementById('stk-notice');

  thead.innerHTML = `<tr>
    <th>${T('stkSymbol')}</th><th>${T('stkBuyDate')}</th><th>${T('stkSellDate')}</th>
    <th class="right">${T('stkDays')}</th><th class="right">${T('stkQty')}</th>
    <th class="right">${T('stkCost')}</th><th class="right">${T('stkProceeds')}</th>
    <th class="right">${T('stkGainUSD')}</th>
    ${hasFx ? `<th class="right eur">${T('stkGainEUR')}</th>` : ''}
    <th>${T('stkStatus')}</th><th class="right">${T('stkTaxUSD')}</th>
    ${hasFx ? `<th class="right eur">${T('stkTaxEUR')}</th>` : ''}
  </tr>`;

  if (!stockLots.length) {
    tbody.innerHTML = `<tr><td colspan="${hasFx?12:10}" class="empty-state">${T('stkEmpty')}</td></tr>`;
    tfoot.innerHTML = ''; return;
  }

  tbody.innerHTML = '';
  [...stockLots].sort((a,b) => (a.sellDate||0)-(b.sellDate||0)).forEach(l => {
    const gCls = l.gain>0 ? 'val-pos' : l.gain<0 ? 'val-neg' : '';
    const badge = l.priorPeriod   ? `<span class="badge badge-unknown">${T('badgeUnknown')}</span>`
                : l.exempt        ? `<span class="badge badge-exempt">${T('badgeExempt')}</span>`
                : l.gain < 0      ? `<span class="badge badge-loss">${T('badgeLoss')}</span>`
                :                   `<span class="badge badge-tax">${T('badgeTaxable')}</span>`;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${escH(l.sym)}</strong></td>
      <td class="mono">${l.priorPeriod ? `<span class="val-muted">${T('stkBefore')}</span>` : fmtDate(l.buyDate)}</td>
      <td class="mono">${fmtDate(l.sellDate)}</td>
      <td class="right">${l.days!==null ? l.days+'d' : '<span class="val-muted">?</span>'}</td>
      <td class="right mono">${l.qty}</td>
      <td class="right">${l.costBasis!==null ? fmt(l.costBasis) : '—'}</td>
      <td class="right">${fmt(l.proceeds)}</td>
      <td class="right ${gCls}">${fmt(l.gain,true)}</td>
      ${hasFx ? `<td class="right val-euro">${fmtE(l.gain_eur,true)}</td>` : ''}
      <td>${badge}</td>
      <td class="right">${l.tax_usd>0 ? `<span class="val-neg">${fmt(l.tax_usd)}</span>` : (l.priorPeriod ? `<span class="val-muted">${T('stkVerify')}</span>` : '—')}</td>
      ${hasFx ? `<td class="right">${l.tax_eur>0 ? `<span class="val-euro">${fmtE(l.tax_eur)}</span>` : (l.priorPeriod ? `<span class="val-muted">${T('stkVerify')}</span>` : '—')}</td>` : ''}
    `;
    tbody.appendChild(tr);
  });

  const known = stockLots.filter(l => !l.priorPeriod);
  const ng  = known.reduce((s,l) => s+(l.gain||0), 0);
  const ngE = hasFx ? known.reduce((s,l) => s+(l.gain_eur||0), 0) : null;
  const tt  = known.reduce((s,l) => s+(l.tax_usd||0), 0);
  const ttE = hasFx ? known.reduce((s,l) => s+(l.tax_eur||0), 0) : null;
  tfoot.innerHTML = `<tr>
    <td colspan="7" style="color:var(--muted);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;">${T('stkFooter', stockLots.length, fmt(sTG,true), fmt(sTL,true))}</td>
    <td class="right ${ng>=0?'val-pos':'val-neg'}">${fmt(ng,true)}</td>
    ${hasFx ? `<td class="right val-euro">${fmtE(ngE,true)}</td>` : ''}
    <td></td>
    <td class="right val-neg">${tt>0 ? fmt(tt) : '—'}</td>
    ${hasFx ? `<td class="right val-euro">${ttE>0 ? fmtE(ttE) : '—'}</td>` : ''}
  </tr>`;

  notice.style.display = hasPriorPeriod ? 'block' : 'none';
  if (hasPriorPeriod) notice.innerHTML = T('stkPriorNotice');
}

function renderSummary(data) {
  const { hasFx, oTG, oTL, oTGe, oTLe, sTG, sTL, sTGe, sTLe, net_usd, net_eur, tax_usd, tax_eur, exempt, hasPriorPeriod } = data;
  const rows = [
    { label: T('sumOptGains'),  usd: oTG,     eur: oTGe,    cls: 'val-pos' },
    { label: T('sumOptLosses'), usd: oTL,     eur: oTLe,    cls: 'val-neg' },
    { label: T('sumStkGains'),  usd: sTG,     eur: sTGe,    cls: 'val-pos' },
    { label: T('sumStkLosses'), usd: sTL,     eur: sTLe,    cls: 'val-neg' },
    { label: T('sumExempt'),    usd: exempt,  eur: null,    cls: 'blue' },
    { label: T('sumNet'),       usd: net_usd, eur: net_eur, cls: net_usd>=0?'val-pos':'val-neg' },
  ];

  const card = document.getElementById('summary-card');
  let html = rows.map(r => `
    <div class="summary-row">
      <span class="summary-label">${r.label}</span>
      <div class="summary-values">
        <span class="summary-value ${r.cls}">${fmt(r.usd, r.label !== T('sumExempt'))}</span>
        ${hasFx && r.eur!=null ? `<span class="summary-value eur">${fmtE(r.eur, r.label !== T('sumExempt'))}</span>` : (hasFx ? '<span class="summary-value" style="color:var(--muted)">—</span>' : '')}
      </div>
    </div>
  `).join('');

  html += `<div class="summary-row total-row">
    <span class="summary-label">${T('sumTotal')}</span>
    <div class="summary-values">
      <span class="summary-value ${tax_usd>0?'val-neg':''}">${fmt(tax_usd)}</span>
      ${hasFx && tax_eur!=null ? `<span class="summary-value eur">${fmtE(tax_eur)}</span>` : ''}
    </div>
  </div>`;

  if (hasPriorPeriod) html += `<div style="margin-top:10px;font-size:11px;color:var(--muted);">${T('sumPriorNote')}</div>`;
  card.innerHTML = html;

  document.getElementById('disclaimer').innerHTML = hasFx ? T('disclFx') : T('disclNoFx');
}

// ── HUB INTEGRATION ────────────────────────────────────────────
window.addEventListener('message', function(ev) {
  if (ev.data && ev.data.type === 'hub-lang') {
    const l = ev.data.lang;
    if (l === 'en' || l === 'hr') setLang(l);
  }
});

(function() {
  function rh() { try { parent.postMessage({ type:'hub-height', height:document.body.scrollHeight },'*'); } catch(e){} }
  window.addEventListener('load', rh);
  window.addEventListener('resize', rh);
  if (window.MutationObserver) new MutationObserver(rh).observe(document.body,{childList:true,subtree:true,attributes:true});
})();
</script>
