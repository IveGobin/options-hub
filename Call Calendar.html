<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Expiry Calendar</title>
<script src="hub_shared.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c; --surface: #1a1916; --surface2: #242220; --border: #333028;
    --txt: #ede8e0; --txt2: #7a7268; --accent: #e8753a; --blue: #6aabf5;
    --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  [data-theme="light"] {
    --bg: #f4f3ef; --surface: #ffffff; --surface2: #f0ede8; --border: #e2ddd8;
    --txt: #1a1814; --txt2: #7a7268; --accent: #c8521a; --blue: #1a4a8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--sans); background: var(--bg); color: var(--txt); min-height: 100vh; transition: background 0.3s, color 0.3s; }
  body { padding: 32px 28px 48px; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 14px; }
  .cal-title { font-family: var(--mono); font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--txt2); }
  .cal-upload { display: flex; align-items: center; gap: 12px; }
  .cal-file-btn { font-family: var(--mono); font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface); color: var(--txt2); cursor: pointer; transition: 0.2s; }
  .cal-file-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cal-file-name { font-family: var(--mono); font-size: 0.68rem; color: var(--accent); }
  .cal-months { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
  .cal-month-block { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .cal-month-title { font-family: var(--mono); font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--txt2); padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .cal-month-total { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); }
  .cal-week { border-bottom: 1px solid var(--border); }
  .cal-week:last-child { border-bottom: none; }
  .cal-week-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: var(--surface2); cursor: pointer; user-select: none; transition: background 0.15s; }
  .cal-week-header:hover { background: var(--border); }
  .cal-week-date { font-family: var(--mono); font-size: 0.75rem; font-weight: 700; color: var(--txt); display: flex; align-items: center; gap: 8px; }
  .cal-week-date .friday-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; background: rgba(232,117,58,0.15); color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
  .cal-week-date .friday-badge.empty { background: rgba(122,114,104,0.12); color: var(--txt2); }
  .cal-week-summary { display: flex; gap: 16px; align-items: center; }
  .cal-week-prem { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); font-weight: 700; }
  .cal-week-exp { font-family: var(--mono); font-size: 0.68rem; color: var(--txt2); }
  .cal-week-body { padding: 0 18px 12px 18px; display: none; }
  .cal-week-body.open { display: block; }
  .cal-position-row { display: grid; grid-template-columns: 80px 1fr 80px 80px 100px; gap: 8px; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
  .cal-position-row:last-child { border-bottom: none; }
  .cal-position-row.header { font-family: var(--mono); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--txt2); padding-top: 10px; }
  .cal-ticker { font-family: var(--mono); font-weight: 700; font-size: 0.82rem; color: var(--txt); }
  .cal-qty { font-family: var(--mono); font-size: 0.78rem; color: var(--txt2); text-align: right; }
  .cal-exposure { font-family: var(--mono); font-size: 0.78rem; color: var(--blue); text-align: right; }
  .cal-premium { font-family: var(--mono); font-size: 0.78rem; color: var(--accent); font-weight: 700; text-align: right; }
  .cal-empty { padding: 40px; text-align: center; color: var(--txt2); font-size: 0.85rem; }
  .cal-empty-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.3; }
  .cal-days-chip { font-family: var(--mono); font-size: 0.6rem; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
  .cal-days-chip.urgent { background: rgba(232,96,96,0.15); color: #e86060; }
  .cal-days-chip.soon   { background: rgba(232,160,58,0.15); color: #e8a03a; }
  .cal-days-chip.ok     { background: rgba(58,173,114,0.15); color: #3aad72; }
  @media (max-width: 700px) { .cal-position-row { grid-template-columns: 60px 1fr 70px 90px; } .cal-qty { display: none; } }
</style>
</head>
<body>
<div class="cal-header">
  <div class="cal-title">📅 Call Expiry Calendar</div>
  <div class="cal-upload">
    <label class="cal-file-btn" for="cal-file-input">Load CSV</label>
    <input type="file" id="cal-file-input" accept=".csv" style="display:none">
    <span class="cal-file-name" id="cal-file-name">No file loaded</span>
  </div>
</div>
<div id="cal-months" class="cal-months">
  <div class="cal-empty"><div class="cal-empty-icon">📅</div>Load your IBKR call export CSV to see expirations.</div>
</div>

<script>
  var _lang = window._hubLang || 'en';
  window._onHubLang = function(lang) { _lang = lang; };
  window._onHubTheme = function(theme) {
    document.documentElement.setAttribute('data-theme', theme);
  };

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function calFmt(n) { if (isNaN(n) || n === null) return '—'; return '$' + Math.round(n).toLocaleString('en-US'); }
  function T(key, vars) { return (window.hubT ? hubT(key, vars) : key); }

  function calGetExpDate(r) { return r['Exp. Date'] || r['Exp- Date'] || r['Exp Date'] || r['ExpDate'] || r['exp_date'] || ''; }
  function calParseDate(str) {
    if (!str) return null;
    var s = String(str).trim();
    if (s[s.length-1] === '.') s = s.slice(0,-1);
    var parts = s.split(/[.\-\/]/);
    if (parts.length === 3) {
      var a = parseInt(parts[0]), b = parseInt(parts[1]), c = parseInt(parts[2]);
      return a > 1900 ? new Date(a, b-1, c) : new Date(c, b-1, a);
    }
    var d = new Date(s); return isNaN(d) ? null : d;
  }
  function splitLine(line) {
    var result = [], cur = '', inQ = false;
    for (var ch of line) { if (ch==='"') inQ=!inQ; else if (ch===','&&!inQ){result.push(cur);cur='';} else cur+=ch; }
    result.push(cur); return result;
  }
  function parseCSV(text) {
    text = String(text).replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    var lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    var headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
    var rows = [];
    for (var i = 1; i < lines.length; i++) {
      var vals = splitLine(lines[i]);
      if (vals.length < 3) continue;
      var row = {};
      headers.forEach((h,idx) => { row[h] = (vals[idx]||'').trim().replace(/^"|"$/g,''); });
      if (!row['Ticker'] || !row['Status']) continue;
      rows.push(row);
    }
    return rows;
  }
  function getNextFridays(monthsAhead) {
    var fridays = [], today = new Date(); today.setHours(0,0,0,0);
    var end = new Date(today.getFullYear(), today.getMonth() + monthsAhead + 1, 0);
    var cur = new Date(today);
    while (cur.getDay() !== 5) cur.setDate(cur.getDate()+1);
    while (cur <= end) { fridays.push(new Date(cur)); cur.setDate(cur.getDate()+7); }
    return fridays;
  }
  function toggleCalWeek(id) { var el = document.getElementById(id); if (el) el.classList.toggle('open'); }
  window.toggleCalWeek = toggleCalWeek;

  function renderCalendar(rows) {
    var openRows = rows.filter(r => r['Status']==='Open' && r['Option']==='SELL');
    var container = document.getElementById('cal-months');
    var today = new Date(); today.setHours(0,0,0,0);
    var fridays = getNextFridays(4);
    var positions = openRows.map(r => {
      var exp = calParseDate(calGetExpDate(r));
      var qty = Math.abs(parseFloat(r['Quantity'])||0);
      var strike = parseFloat(r['Strike Price'])||0;
      var premium = parseFloat(String(r['Total Premium']||'0').replace(/[^\d.\-]/g,''))||0;
      var exposure = strike>0 ? strike*qty*100 : parseFloat(String(r['Exposure']||'0').replace(/[^\d.\-]/g,''))||0;
      return { ticker: r['Ticker'], exp, qty, strike, premium, exposure };
    }).filter(p => p.exp);
    var monthMap = {};
    fridays.forEach(fri => {
      var key = fri.getFullYear()+'-'+String(fri.getMonth()+1).padStart(2,'0');
      if (!monthMap[key]) monthMap[key] = { year: fri.getFullYear(), month: fri.getMonth(), fridays: [] };
      monthMap[key].fridays.push(fri);
    });
    var loc = _lang === 'hr' ? 'hr-HR' : 'en-US';
    var html = '';
    Object.values(monthMap).forEach(m => {
      var monthLabel = new Date(m.year, m.month, 1).toLocaleString(loc, { month:'long', year:'numeric' });
      var monthTotalPrem = 0, weeksHtml = '';
      m.fridays.forEach(fri => {
        var friEnd = new Date(fri); friEnd.setHours(23,59,59);
        var prevFriday = new Date(fri); prevFriday.setDate(prevFriday.getDate()-6);
        var pos = positions.filter(p => { var d=p.exp; return d.getFullYear()===fri.getFullYear()&&d.getMonth()===fri.getMonth()&&d.getDate()===fri.getDate(); });
        var weekPos = positions.filter(p => { var d=p.exp; return d>=prevFriday&&d<=friEnd&&!(d.getFullYear()===fri.getFullYear()&&d.getMonth()===fri.getMonth()&&d.getDate()===fri.getDate()); });
        var allPos = [...pos,...weekPos];
        var totalPrem = allPos.reduce((s,p)=>s+p.premium,0);
        var totalExp  = allPos.reduce((s,p)=>s+p.exposure,0);
        monthTotalPrem += totalPrem;
        var daysLeft = Math.round((fri-today)/(1000*60*60*24));
        var isPast = daysLeft < 0;
        var daysChip = isPast ? `<span class="cal-days-chip" style="opacity:0.4">${T('cal_past')}</span>`
          : `<span class="cal-days-chip ${daysLeft<=7?'urgent':daysLeft<=21?'soon':'ok'}">${daysLeft}d</span>`;
        var fridayStr = fri.toLocaleDateString(loc, {weekday:'short',month:'short',day:'numeric'});
        var badgeCls = allPos.length>0 ? '' : ' empty';
        var rowsHtml = '';
        if (allPos.length>0) {
          rowsHtml = `<div class="cal-position-row header"><div>${T('cal_hdr_ticker')}</div><div>${T('cal_hdr_strike')}</div><div style="text-align:right">${T('cal_hdr_qty')}</div><div style="text-align:right">${T('cal_hdr_exposure')}</div><div style="text-align:right">${T('cal_hdr_premium')}</div></div>`;
          allPos.forEach(p => {
            var expStr = p.exp.toLocaleDateString(loc,{month:'short',day:'numeric'});
            rowsHtml += `<div class="cal-position-row"><div class="cal-ticker">${escapeHtml(p.ticker)}</div><div style="font-size:0.75rem;color:var(--txt2)">$${p.strike>0?p.strike.toFixed(0):'—'} · ${expStr}</div><div class="cal-qty">${p.qty}</div><div class="cal-exposure">${p.exposure>0?calFmt(p.exposure):'—'}</div><div class="cal-premium">${calFmt(p.premium)}</div></div>`;
          });
          rowsHtml += `<div class="cal-position-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:8px"><div style="grid-column:1/4;font-family:var(--mono);font-size:0.65rem;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;">${T('cal_total')}</div><div class="cal-exposure">${calFmt(totalExp)}</div><div class="cal-premium">${calFmt(totalPrem)}</div></div>`;
        }
        var weekId = 'week-'+fri.getTime();
        weeksHtml += `<div class="cal-week"><div class="cal-week-header" onclick="toggleCalWeek('${weekId}')"><div class="cal-week-date">${fridayStr}<span class="friday-badge${badgeCls}">${allPos.length>0?T('cal_pos_badge',{n:allPos.length}):T('cal_empty')}</span>${daysChip}</div><div class="cal-week-summary">${allPos.length>0?`<span class="cal-week-prem">${calFmt(totalPrem)}</span><span class="cal-week-exp">${calFmt(totalExp)} ${T('cal_exp')}</span>`:'<span class="cal-week-exp" style="opacity:0.4">—</span>'}</div></div><div class="cal-week-body" id="${weekId}">${rowsHtml||'<div style="color:var(--txt2);font-size:0.8rem;padding:8px 0;">'+T('cal_no_exp')+'</div>'}</div></div>`;
      });
      html += `<div class="cal-month-block"><div class="cal-month-title"><span>${monthLabel}</span><span class="cal-month-total">${monthTotalPrem>0?calFmt(monthTotalPrem)+' '+T('cal_premium'):'—'}</span></div>${weeksHtml}</div>`;
    });
    container.innerHTML = html || '<div class="cal-empty"><div class="cal-empty-icon">📅</div>No open positions found.</div>';
  }

  document.getElementById('cal-file-input').addEventListener('change', function(e) {
    var file = e.target.files[0]; if (!file) return;
    document.getElementById('cal-file-name').textContent = file.name;
    var reader = new FileReader();
    reader.onload = function(ev) { renderCalendar(parseCSV(ev.target.result)); };
    reader.readAsText(file);
  });
</script>
</body>
</html>
